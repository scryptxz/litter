<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Noite</title>
    <link rel="stylesheet" th:href="@{css/index.css}" />
    <script th:src="@{js/index.js}"></script>
  </head>
  <body>
    <main>
      <div class="posts-container">
        <a th:href="@{/}">Voltar</a>
        <header>
          <img th:src="@{img/icon.jpg}" id="user-icon-header" alt="" />
        </header>
        <div class="user-info">
          <div class="user-id">
            <a>Scrypt</a>
            <span class="user-handle">@flipthescrypt</span>
          </div>
        </div>
        <div class="single-post">
          <img th:src="@{img/icon.jpg}" class="user-icon" alt="" />
          <div class="text-side">
            <div class="user-id">
              <a>Scrypt</a>
              <span class="user-handle">@flipthescrypt</span>
            </div>
            <p>
              Lorem ipsum dolor sit amet consectetur adipisicing elit. Ratione,
              modi ea necessitatibus, praesentium aliquam qui aperiam eos nobis
              quis similique at optio corrupti nemo suscipit eum sequi dolorem
              quo facilis?
            </p>
            <div class="interactions">
              <img th:src="@{img/icons/star.svg}" class="interaction-icon" />
              <img th:src="@{img/icons/repost.svg}" class="interaction-icon" />
              <img th:src="@{img/icons/comment.svg}" class="interaction-icon" />
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
